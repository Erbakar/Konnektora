[build]
  command = "export DATABASE_URL=\"${DATABASE_URL:-${NETLIFY_DB_URL:-postgresql://konnektora:konnektora@localhost:5432/konnektora}}\" && npm run db:generate && if [ -n \"$NETLIFY_DB_URL\" ]; then npm run db:deploy; else echo \"Skipping db:deploy because NETLIFY_DB_URL is not available\"; fi && npm run build -w packages/shared && npm run build -w apps/api && npm run build -w apps/web"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@nestjs/common",
    "@nestjs/config",
    "@nestjs/core",
    "@nestjs/jwt",
    "@nestjs/passport",
    "@nestjs/platform-express",
    "@prisma/client",
    "bcryptjs",
    "class-transformer",
    "class-validator",
    "express",
    "passport",
    "reflect-metadata",
    "rxjs",
    "serverless-http"
  ]
  included_files = [
    "apps/api/dist/**",
    "apps/api/prisma/**",
    "node_modules/.prisma/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
