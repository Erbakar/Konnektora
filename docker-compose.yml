services:
  postgres:
    image: postgres:16-alpine
    container_name: konnektora-postgres
    environment:
      POSTGRES_DB: konnektora
      POSTGRES_USER: konnektora
      POSTGRES_PASSWORD: konnektora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U konnektora -d konnektora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

