services:
  - type: web
    runtime: node
    name: konnektora-api
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm ci && npm run db:generate && npm run build -w packages/shared && npm run build -w apps/api
    preDeployCommand: npm run db:deploy
    startCommand: npm run start -w apps/api
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: konnektora-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://konnektora.netlify.app
      - key: PUBLIC_APP_URL
        value: https://konnektora.netlify.app
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: konnektora-db
    databaseName: konnektora
    user: konnektora
    region: frankfurt
    plan: free
