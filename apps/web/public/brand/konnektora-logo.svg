<svg width="210" height="48" viewBox="0 0 210 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Konnektora</title>
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1a11"/>
      <stop offset="100%" stop-color="#1a3020"/>
    </linearGradient>
  </defs>

  <!-- Icon mark background -->
  <rect width="48" height="48" rx="12" fill="url(#icon-bg)"/>

  <!-- Network connection lines (subtle) -->
  <line x1="14" y1="14" x2="34" y2="14" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="34" x2="34" y2="34" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="14" x2="14" y2="34" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Main paths -->
  <path d="M14 14 L34 34" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M34 14 L22 24 L34 34" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nodes -->
  <circle cx="14" cy="14" r="4.5" fill="#22c55e"/>
  <circle cx="34" cy="14" r="4.5" fill="rgba(255,255,255,0.9)"/>
  <circle cx="14" cy="34" r="4.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="34" cy="34" r="4.5" fill="#22c55e"/>

  <!-- Wordmark -->
  <text
    x="60"
    y="32"
    fill="#0f1a14"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="21"
    font-weight="800"
    letter-spacing="-0.6"
  >Konnektora</text>
</svg>
